<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Apex | Sign Up</title>

  <link rel="stylesheet" href="signup.css" />
  <!-- defer = wait until HTML is parsed before running JS, so getElementById finds the form -->
  <script src="signup.js" defer></script>
</head>
<body>
  <main class="signup-container">
    <a href="home.html" class="brand-logo" aria-label="Apex home">
      <img src="picture/apex_logo.png" alt="Apex" />
    </a>
    <h1>Create your account</h1>

    <!-- novalidate disables the browser's built-in error popups so we control all error UI from JS -->
    <form id="signup-form" novalidate>
      <label for="name">Name</label>
      <input id="name" name="name" type="text" required autocomplete="name" />

      <label for="email">Email</label>
      <input id="email" name="email" type="email" required autocomplete="email" />

      <!-- minlength=8 matches the backend's password rule in auth.controller.js -->
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required minlength="8" autocomplete="new-password" />

      <!-- Backend only accepts role = "student" or "mentor" (admin signups are blocked server-side) -->
      <fieldset>
        <legend>I am a...</legend>
        <label><input type="radio" name="role" value="student" checked /> Student</label>
        <label><input type="radio" name="role" value="mentor" /> Mentor</label>
      </fieldset>

      <button type="submit" id="submit-btn">Sign up</button>

      <!-- Hidden by default; signup.js fills + unhides it when the server returns an error -->
      <p id="error-message" class="error" role="alert" hidden></p>
    </form>

    <p>Already have an account? <a href="login.html">Log in</a></p>
  </main>
</body>
</html>
